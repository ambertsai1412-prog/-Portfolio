<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>場域空間 - 快樂實驗室</title>
  <style>
    * { box-sizing: border-box; }
    
    body {
      margin: 0;
      background: linear-gradient(135deg, #f2fff7 0%, #e6ffed 100%);
      font-family: "Poppins", "Noto Sans TC", sans-serif;
      color: #444;
      overflow-x: hidden;
      min-height: 100vh;
    }

    /* --- 返回按鈕 --- */
    .back-btn {
      position: fixed;
      top: 20px;
      left: 20px;
      text-decoration: none;
      background: rgba(255, 255, 255, 0.7);
      padding: 10px 20px;
      border-radius: 30px;
      color: #666;
      font-weight: 600;
      backdrop-filter: blur(5px);
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
      z-index: 1000;
      transition: 0.3s;
    }
    .back-btn:hover { background: #fff; transform: translateX(-5px); color: #88bc9c; }

    header {
      text-align: center;
      padding: 5rem 1rem 2rem;
    }

    header h1 {
      font-size: 2.5rem;
      letter-spacing: 4px;
      color: #555;
      margin-bottom: 10px;
    }

    /* --- 專案網格 --- */
    .project-grid {
      max-width: 1100px;
      margin: 0 auto 60px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 25px;
      padding: 0 20px;
      position: relative;
      z-index: 5;
    }

    /* 修改：確保連結卡片撐開並移除底線 */
    .card {
      display: block; 
      background: #fff;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 10px 20px rgba(0,0,0,0.05);
      transition: 0.4s;
      text-decoration: none; /* 移除超連結底線 */
      color: inherit; /* 繼承原本文字顏色 */
    }

    .card:hover {
      transform: translateY(-10px);
      box-shadow: 0 15px 30px rgba(0,0,0,0.1);
    }

    .card-img {
      width: 100%;
      height: 250px;
      overflow: hidden;
    }

    .card-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: 0.5s;
    }

    .card:hover .card-img img { transform: scale(1.1); }

    .card-content { padding: 20px; }

    .card-tag {
      font-size: 0.75rem;
      color: #88bc9c;
      font-weight: 700;
      letter-spacing: 1px;
      display: block;
      margin-bottom: 5px;
    }

    .card-title { font-size: 1.25rem; font-weight: 700; margin: 0 0 10px 0; }

    .card-desc { font-size: 0.9rem; color: #777; line-height: 1.6; }

    footer { text-align: center; padding: 40px; color: #aaa; font-size: 0.9rem; }

    /* --- 特別設計：🌿 靈感按鈕 --- */
    .inspire-btn {
      position: fixed;
      bottom: 30px;
      right: 30px;
      width: 70px;
      height: 70px;
      background: #88bc9c;
      border: none;
      border-radius: 50%;
      color: white;
      font-size: 1.8rem;
      cursor: pointer;
      box-shadow: 0 8px 25px rgba(136, 188, 156, 0.4);
      z-index: 1000;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      display: flex;
      align-items: center;
      justify-content: center;
      animation: breathe 3s infinite ease-in-out;
    }

    .inspire-btn:hover {
      transform: scale(1.1) rotate(15deg);
      background: #76a889;
    }

    @keyframes breathe {
      0%, 100% { box-shadow: 0 0 0 0 rgba(136, 188, 156, 0.6); }
      50% { box-shadow: 0 0 0 15px rgba(136, 188, 156, 0); }
    }

    .leaf {
      position: fixed;
      pointer-events: none;
      z-index: 1;
      user-select: none;
      animation: leafFall 5s linear forwards;
    }

    @keyframes leafFall {
      0% { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
    }
  </style>
</head>
<body>

  <a href="index.html" class="back-btn">← 返回首頁</a>

  <header>
    <h1>🌿 場域空間</h1>
    <p>&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; 創造有溫度的環境，連結人與空間的記憶。</p>
  </header>

  <section class="project-grid">
    <a href="page41.html" class="card">
      <div class="card-img">
        <img src="images/0005.jpg" alt="作品一"> 
      </div>
      <div class="card-content">
        <span class="card-tag">牆與空間</span>
        <h3 class="card-title">《光影馬屋：追尋自由的旅程》</h3>
        <p class="card-desc">以「馬」為靈感，將空間轉化為力量與勇氣的形態。這是一段透過光影與感官釋放情緒、追尋內心自由的自我探索旅程。</p>
      </div>
    </a>

    <div class="card">
      <div class="card-img">
        <img src="images/space_02.jpg" alt="作品二">
      </div>
      <div class="card-content">
        <span class="card-tag">INTERIOR CONCEPT</span>
        <h3 class="card-title">光影交織的閱讀室</h3>
        <p class="card-desc">利用大量自然採光與木質材料，重新定義圖書館角落的舒適感。</p>
      </div>
    </div>

    <div class="card">
      <div class="card-img">
        <img src="images/space_03.jpg" alt="作品三">
      </div>
      <div class="card-content">
        <span class="card-tag">LANDSCAPE</span>
        <h3 class="card-title">校園休憩地景</h3>
        <p class="card-desc">結合永續材料的戶外座位設計，讓學生能在課程空檔感受大自然的律動。</p>
      </div>
    </div>
  </section>

  <footer>© 2025 Joy Maker | 蔡易倫</footer>

  <button class="inspire-btn" onclick="plantSeed()">🌿</button>

  <script>
    function plantSeed() {
      const emoji = ["🌿", "🍀", "🍂", "🍃", "🍁"];
      for (let i = 0; i < 8; i++) {
        setTimeout(() => {
          const leaf = document.createElement("div");
          leaf.className = "leaf";
          leaf.innerText = emoji[Math.floor(Math.random() * emoji.length)];
          leaf.style.left = Math.random() * 100 + "vw";
          leaf.style.bottom = "0px";
          const size = Math.random() * 30 + 30;
          leaf.style.fontSize = size + "px";
          leaf.style.animationDuration = (Math.random() * 3 + 2) + "s";
          document.body.appendChild(leaf);
          setTimeout(() => leaf.remove(), 5000);
        }, i * 100);
      }
    }
  </script>
</body>
</html>
